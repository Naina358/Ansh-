<!DOCTYPE html>
<html>
<head>
  <title>🏏 BidBattle Auction</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #2b5876);
      color: white;
      padding: 20px;
    }

    h1 { text-align:center; }

    button {
      padding: 10px;
      margin: 10px 0;
      background: #00c6ff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: rgba(255,255,255,0.05);
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 6px;
    }

    .top {
      background: gold;
      color: black;
      font-weight: bold;
      box-shadow: 0 0 15px gold;
    }

    .red { color: red; }
    .green { color: lime; }

    tr {
      transition: all 0.3s ease;
    }
  </style>
</head>

<body>

<h1>🏏 BidBattle Auction Dashboard</h1>

<button onclick="addPlayer()">➕ Add Player</button>

<table id="table">
<tr>
<th>Team</th>
<th>Player</th>
<th>Role</th>
<th>Price</th>
<th>Rating</th>
<th>Foreign</th>
<th>Action</th>
</tr>
</table>

<h2>📊 Summary</h2>

<table id="summary">
<tr>
<th>Team</th>
<th>Players</th>
<th>Spent</th>
<th>Remaining</th>
<th>Rating</th>
<th>Rank</th>
<th>Status</th>
</tr>
</table>

<script>

let players = [];
let budget = 90;

function addPlayer() {
  let row = document.getElementById("table").insertRow();

  row.innerHTML = `
    <td><input placeholder="Team"></td>
    <td><input placeholder="Player"></td>
    <td>
      <select>
        <option>Batter</option>
        <option>Bowler</option>
        <option>All-Rounder</option>
        <option>Wicket Keeper</option>
      </select>
    </td>
    <td><input type="number" min="0"></td>
    <td><input type="number" min="0"></td>
    <td>
      <select><option>N</option><option>Y</option></select>
    </td>
    <td><button onclick="save(this)">Save</button></td>
  `;
}

function save(btn) {
  let row = btn.closest("tr");

  let team = row.cells[0].children[0].value.trim();
  let player = row.cells[1].children[0].value.trim();

  if (!team || !player) {
    alert("Enter Team & Player");
    return;
  }

  let data = {
    team,
    player,
    role: row.cells[2].children[0].value,
    price: Number(row.cells[3].children[0].value) || 0,
    rating: Number(row.cells[4].children[0].value) || 0,
    foreign: row.cells[5].children[0].value
  };

  players.push(data);

  btn.innerText = "✔ Saved";
  btn.style.background = "limegreen";
  btn.disabled = true;

  // sound
  new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3").play();

  // animation
  row.style.background = "#00ff8830";
  setTimeout(()=>row.style.background="", 800);

  updateSummary();
}

function updateSummary() {
  let teams = {};

  players.forEach(p => {
    if (!teams[p.team]) {
      teams[p.team] = {
        players:0, spent:0, rating:0, roles:{}, foreign:0
      };
    }

    let t = teams[p.team];
    t.players++;
    t.spent += p.price;
    t.rating += p.rating;

    if (p.foreign === "Y") t.foreign++;

    t.roles[p.role] = (t.roles[p.role] || 0) + 1;
  });

  render(teams);
}

function render(teams) {
  let table = document.getElementById("summary");

  while (table.rows.length > 1) {
    table.deleteRow(1);
  }

  let sorted = Object.entries(teams)
    .sort((a,b)=>b[1].rating - a[1].rating);

  sorted.forEach((t,i)=>{
    let d = t[1];
    let remaining = budget - d.spent;

    let issues = [];

    if ((d.roles["Batter"] || 0) < 3) issues.push("Bat<3");
    if ((d.roles["Bowler"] || 0) < 3) issues.push("Bowl<3");
    if ((d.roles["All-Rounder"] || 0) < 1) issues.push("No AR");
    if ((d.roles["Wicket Keeper"] || 0) < 1) issues.push("No WK");
    if (d.foreign > 4) issues.push("Foreign>4");

    let valid = issues.length === 0;

    let row = table.insertRow();

    if (i === 0) {
      row.classList.add("top");
    }

    row.innerHTML = `
      <td>${t[0]}</td>
      <td>${d.players}</td>
      <td>${d.spent}</td>
      <td class="${remaining<10?'red':'green'}">${remaining}</td>
      <td>${d.rating}</td>
      <td>${i+1}</td>
      <td class="${valid?'green':'red'}">
        ${valid ? 'VALID' : issues.join(', ')}
      </td>
    `;
  });
}

</script>

</body>
</html>
